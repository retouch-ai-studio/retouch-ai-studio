name: Автоматическое обновление сайта из ВКонтакте

on:
  schedule:
    # Каждый день в 00:00 UTC = 03:00 по Москве
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Клонирование репозитория
        uses: actions/checkout@v4

      - name: Установка Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Установка библиотек
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pillow

      - name: Обновление базы портфолио из ВК
        env:
          VK_SERVICE_TOKEN: ${{ secrets.VK_SERVICE_TOKEN }}
          VK_TOKEN: ${{ secrets.VK_TOKEN }}
        run: |
          python scripts_and_raw_data/fetch_all_vk.py
          python scripts_and_raw_data/build_site.py

      - name: Коммит и публикация обновленного сайта
        run: |
          git config --global user.name "VK-AutoBot"
          git config --global user.email "autobot@photo-ai-studio.ru"
          git add -A
          if git diff --staged --quiet; then
            echo "Новых изменений нет — сайт актуален."
          else
            git commit -m "🤖 Обновление портфолио из ВК"
            git push
          fi
